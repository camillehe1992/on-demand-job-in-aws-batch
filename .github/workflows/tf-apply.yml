name: Terraform Apply

run-name: "⚡ Terraform Apply - ${{ inputs.environment }} (Manual)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
        required: true

permissions:
  id-token: write # Required for OIDC authentication
  contents: read
  pull-requests: write

env:
  AWS_REGION: "${{ vars.AWS_REGION }}"
  ENVIRONMENT: "${{ inputs.environment }}"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: "${{ inputs.environment }}"
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_TO_ASSUME }}
          role-session-name: ${{ vars.ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Get Terraform Version from Source
        id: tf-version
        run: |
          # Extract Terraform version from environments/root.hcl
          TF_VERSION=$(grep -o 'required_version = ">= [0-9.]*"' environments/root.hcl | sed 's/required_version = ">= //' | sed 's/"//' | head -1)
          echo "TF_VERSION=$TF_VERSION" >> $GITHUB_OUTPUT
          echo "Using Terraform version: $TF_VERSION"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ steps.tf-version.outputs.TF_VERSION }}

      - name: Get Terragrunt Version from Source
        run: |
          TG_VERSION=$(cat .terragrunt-version)
          echo "TG_VERSION=$TG_VERSION" >> $GITHUB_ENV

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v1.1.0
        with:
          terragrunt_version: ${{ env.TG_VERSION }}

      - name: Terraform Plan
        id: tf-plan
        run: |
          ENVIRONMENT=${{ env.ENVIRONMENT }}
          cd environments/${ENVIRONMENT}

          echo "[*] Running Terraform plan for ${ENVIRONMENT} environment"

          # Run terragrunt plan with detailed exit code and capture the exit code
          set +e  # Allow the command to fail without stopping the script
          just plan-all ${ENVIRONMENT}
          PLAN_EXIT_CODE=$?
          set -e  # Re-enable exit on error

          echo "[*] Terraform plan completed with exit code: ${PLAN_EXIT_CODE}"

          # Interpret the exit code:
          # 0 = No changes
          # 1 = Error
          # 2 = Changes detected
          if [ ${PLAN_EXIT_CODE} -eq 2 ]; then
            echo "tfplanExitCode=2" >> $GITHUB_OUTPUT
            echo "[*] ✅ Changes detected in Terraform plan"
          elif [ ${PLAN_EXIT_CODE} -eq 0 ]; then
            echo "tfplanExitCode=0" >> $GITHUB_OUTPUT
            echo "[*] ✅ No changes detected in Terraform plan"
          else
            echo "tfplanExitCode=1" >> $GITHUB_OUTPUT
            echo "[!] ❌ Terraform plan failed with exit code: ${PLAN_EXIT_CODE}"
            exit 1
          fi

      - name: Create Plan Summary
        if: steps.tf-plan.outputs.tfplanExitCode == '2'
        run: |
          cd environments/${{ env.ENVIRONMENT }}
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: Changes detected" >> $GITHUB_STEP_SUMMARY

  terraform-apply:
    name: Terraform Apply
    if: needs.terraform-plan.outputs.tfplanExitCode == '2'
    runs-on: ubuntu-latest
    environment: "${{ inputs.environment }}"
    needs: [terraform-plan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_TO_ASSUME }}
          role-session-name: ${{ vars.ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Get Terraform Version from Source
        id: tf-version
        run: |
          TF_VERSION=$(grep -o 'required_version = ">= [0-9.]*"' environments/root.hcl | sed 's/required_version = ">= //' | sed 's/"//' | head -1)
          echo "TF_VERSION=$TF_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ steps.tf-version.outputs.TF_VERSION }}

      - name: Get Terragrunt Version from Source
        run: |
          TG_VERSION=$(cat .terragrunt_version.txt)
          echo "TG_VERSION=$TG_VERSION" >> $GITHUB_ENV

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v1.1.0
        with:
          terragrunt_version: ${{ env.TG_VERSION }}

      - name: Terraform Apply
        run: |
          cd environments/${{ env.ENVIRONMENT }}
          just apply-all ${{ env.ENVIRONMENT }}

      - name: Post Apply Summary
        run: |
          echo "## Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: Successfully applied" >> $GITHUB_STEP_SUMMARY
